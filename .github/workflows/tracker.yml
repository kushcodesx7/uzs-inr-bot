name: UZS to INR tracker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: uzs-inr-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run tracker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          AMOUNT_UZS: ${{ secrets.AMOUNT_UZS }}
        run: python bot.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If nothing changed in any state file, nothing to do.
          if git diff --quiet -- last_rate.json history.xlsx docs/data.json \
            && git diff --cached --quiet -- last_rate.json history.xlsx docs/data.json; then
            echo "No state changes to commit."
            exit 0
          fi

          # Stash our just-computed state, rebase the working tree onto the
          # latest remote main, then restore our state on top. This avoids
          # every rebase/merge conflict because we simply replace main's
          # copies of the state files with the runner's freshly-computed
          # ones — which are always the authoritative newest values.
          TMPDIR=$(mktemp -d)
          cp last_rate.json "$TMPDIR/last_rate.json"
          cp history.xlsx "$TMPDIR/history.xlsx"
          cp docs/data.json "$TMPDIR/data.json"

          for i in 1 2 3 4; do
            git fetch origin main
            git reset --hard origin/main
            cp "$TMPDIR/last_rate.json" last_rate.json
            cp "$TMPDIR/history.xlsx" history.xlsx
            cp "$TMPDIR/data.json" docs/data.json
            git add last_rate.json history.xlsx docs/data.json
            if git diff --cached --quiet; then
              echo "State matches latest main; nothing to commit."
              exit 0
            fi
            git commit -m "chore: update tracker state [skip ci]"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push race (attempt $i). Re-syncing with latest main..."
            sleep $((2 ** i))
          done
          echo "Push failed after retries." >&2
          exit 1
