name: UZS to INR tracker

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: uzs-inr-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Run tracker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          AMOUNT_UZS: ${{ secrets.AMOUNT_UZS }}
        run: python bot.py

      - name: Commit state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last_rate.json history.xlsx docs/data.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "chore: update tracker state [skip ci]"
          for i in 1 2 3 4; do
            if git push; then
              exit 0
            fi
            echo "Push failed, rebasing on latest main and retrying..."
            # The runner's just-computed state is always newer than whatever
            # landed on main mid-run, so prefer our version on any conflict.
            git pull --rebase -X theirs origin main || {
              echo "Rebase failed; aborting." >&2
              exit 1
            }
            sleep $((2 ** i))
          done
          echo "Push failed after retries" >&2
          exit 1
